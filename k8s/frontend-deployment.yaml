apiVersion: apps/v1
kind: Deployment
metadata:
  name: mini-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mini-frontend
  template:
    metadata:
      labels:
        app: mini-frontend
    spec:
      containers:
        - name: mini-frontend
          image: mini-frontend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5173
